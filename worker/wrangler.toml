name = "driver-wallet-worker"
main = "src/index.ts"
compatibility_date = "2024-09-02"
nodejs_compat = true

[observability]
enabled = true

[vars]
# FRONTEND origin allowlist (comma-separated) or leave empty to allow all origins
ALLOWED_ORIGINS = ""
SUPER_ADMIN_EMAIL = "enchoenterprises@gmail.com"
GOOGLE_CLIENT_ID = ""

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "" # set to your Hyperdrive ID

[triggers]
crons = ["*/5 * * * *"]
